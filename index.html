<head>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Courier New', monospace;
      background: #0a0a0a;
      overflow-x: hidden;
      padding-bottom: 60px;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background:

    #particles, #fireworks {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    #fireworks { z-index: 1; }

    #flash {
      position: fixed;
      top: 0; left: 0;

      pointer-events: none;
      z-index: 999;
      opacity: 0;
      transition: opacity 0.1s;
    }

    .wrapper {
      position: relative;
      z-index: 10;
      display: flex;
      gap: 20px;
      align-items: flex-start;
      padding: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .game-container, .leaderboard {
      background: rgba(0,0,0,0.85);
      border: 1px solid #00ffff;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 0 30px rgba(0,255,255,0.3);
    }

    .game-container { width: 400px; text-align: center; }
    .leaderboard { width: 250px; }

    h1 {
      font-size: 22px;
      color: #00ffff;
      letter-spacing: 4px;
      text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
      animation: flicker 3s infinite;
      margin-bottom: 5px;
    }

    @keyframes flicker {
      0%,95%,100% { opacity: 1; }
      96% { opacity: 0.4; }
      98% { opacity: 0.2; }
    }

    .subtitle {
      color: #ff00ff;
      font-size: 10px;
      letter-spacing: 3px;
      margin-bottom: 15px;
      text-shadow: 0 0 10px #ff00ff;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      margin: 15px 0;
      gap: 10px;
    }

    .stat-box {
      flex: 1;
      background: rgba(0,255,255,0.05);
      border: 1px solid rgba(0,255,255,0.2);
      border-radius: 10px;
      padding: 8px;
      text-align: center;
    }

    .stat-label {
      font-size: 9px;
      color: #888;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .stat-value {
      font-size: 24px;
      font-weight: bold;
      color: #00ffff;
      text-shadow: 0 0 10px #00ffff;
    }

    .timer-bar {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      margin: 12px 0;
      overflow: hidden;
    }

    .timer-fill {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #ff00ff, #00ffff);
      border-radius: 10px;
      transition: width 1s linear;
      box-shadow: 0 0 10px #00ffff;
    }

    .question-box {
      border: 2px solid #ff00ff;
      border-radius: 15px;
      padding: 20px;
      margin: 15px 0;
      font-size: 34px;
      font-weight: bold;
      color: #ff00ff;
      text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff;
      letter-spacing: 4px;
      animation: questionPulse 2s infinite;
    }

    @keyframes questionPulse {
      0%,100% { box-shadow: 0 0 20px rgba(255,0,255,0.2); }
      50%      { box-shadow: 0 0 40px rgba(255,0,255,0.5); }
    }

    input {
      width: 100%;
      padding: 12px;
      font-size: 20px;
      text-align: center;
      border: 2px solid rgba(0,255,255,0.3);
      border-radius: 10px;
      background: rgba(0,255,255,0.05);
      color: #00ffff;
      outline: none;
      margin-bottom: 12px;
      font-family: 'Courier New', monospace;
      letter-spacing: 2px;
      transition: all 0.3s;
    }

    input:focus {
      border-color: #00ffff;
      box-shadow: 0 0 20px rgba(0,255,255,0.3);
    }

    button {
      width: 100%;
      padding: 12px;
      font-size: 14px;
      font-weight: bold;
      font-family: 'Courier New', monospace;
      background: transparent;
      color: #00ffff;
      border: 2px solid #00ffff;
      border-radius: 10px;
      cursor: pointer;
      letter-spacing: 3px;
      transition: all 0.3s;
      text-transform: uppercase;
      box-shadow: 0 0 10px rgba(0,255,255,0.2);
    }

    button:hover {
      background: #00ffff;
      color: #000;
      box-shadow: 0 0 20px rgba(0,255,255,0.6);
      transform: translateY(-2px);
    }

    .message {
      margin-top: 12px;
      font-size: 18px;
      font-weight: bold;
      height: 28px;
      letter-spacing: 2px;
    }

    .correct {
      color: #00ff88;
      text-shadow: 0 0 10px #00ff88;
      animation: bounce 0.4s ease;
    }

    .wrong {
      color: #ff0055;
      text-shadow: 0 0 10px #ff0055;
      animation: shake 0.4s ease;
    }

    @keyframes bounce {
      0%  { transform: scale(1); }
      40% { transform: scale(1.4); }
      100%{ transform: scale(1); }
    }

    @keyframes shake {
      0%  { transform: translateX(0); }
      25% { transform: translateX(-12px); }
      75% { transform: translateX(12px); }
      100%{ transform: translateX(0); }
    }

    .streak {
      font-size: 11px;
      color: #f0a500;
      text-shadow: 0 0 10px #f0a500;
      letter-spacing: 2px;
      margin-top: 5px;
      height: 18px;
    }

    .name-screen { text-align: center; color: white; }

    .name-screen h2 {
      color: #00ffff;
      font-size: 18px;
      letter-spacing: 3px;
      margin-bottom: 20px;
      text-shadow: 0 0 10px #00ffff;
    }

    .leaderboard h2 {
      color: #00ffff;
      font-size: 13px;
      letter-spacing: 3px;
      text-align: center;
      margin-bottom: 15px;
      text-shadow: 0 0 10px #00ffff;
    }

    .lb-entry {
      display: flex;
      justify-content: space-between;
      padding: 8px 10px;
      margin: 5px 0;
      background: rgba(0,255,255,0.05);
      border-radius: 8px;
      border: 1px solid rgba(0,255,255,0.1);
      font-size: 12px;
      color: white;
      letter-spacing: 1px;
    }

    .lb-entry.top1 { border-color: #f0a500; color: #f0a500; }
    .lb-entry.top2 { border-color: #aaa; color: #aaa; }
    .lb-entry.top3 { border-color: #cd7f32; color: #cd7f32; }
    .lb-score { color: #00ffff; font-weight: bold; }
    .lb-empty {
      color: #444;
      font-size: 12px;
      text-align: center;
      margin-top: 20px;
      letter-spacing: 1px;
    }

    /* Affiliate Banner */
    .affiliate-banner {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: linear-gradient(90deg, rgba(0,0,0,0.97), rgba(0,255,255,0.08));
      border-top: 1px solid #00ffff;
      padding: 10px 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
      z-index: 1000;
      font-family: 'Courier New', monospace;
    }

    .affiliate-banner span.label {
      color: #555;
      font-size: 10px;
      letter-spacing: 2px;
    }

    .affiliate-banner span.text {
      color: #00ffff;
      font-size: 12px;
      letter-spacing: 1px;
    }

    .affiliate-banner a {
      background: transparent;
      color: #00ffff;
      border: 1px solid #00ffff;
      padding: 5px 14px;
      border-radius: 5px;
      text-decoration: none;
      font-size: 11px;
      letter-spacing: 2px;
      white-space: nowrap;
      transition: all 0.3s;
    }

    .affiliate-banner a:hover {
      background: #00ffff;
      color: #000;
    }

    .affiliate-banner .close-btn {
      position: absolute;
      right: 15px;
      color: #444;
      cursor: pointer;
      font-size: 16px;
    }

    .affiliate-banner .close-btn:hover { color: #fff; }
  </style>
</head>
<body>

<canvas id="particles"></canvas>
<canvas id="fireworks"></canvas>
<div id="flash"></div>

<div class="wrapper">

  <!-- GAME -->
  <div class="game-container">

    <!-- Name Screen -->
    <div id="nameScreen" class="name-screen">
      <h1>⚡ CYBER MATH ⚡</h1>
      <div class="subtitle">// NEURAL ARITHMETIC TRAINING //</div>
      <br><br>
      <h2>ENTER YOUR NAME</h2>
      <input type="text" id="playerName" placeholder="Your name..."
             maxlength="15"
             onkeypress="if(event.key==='Enter') startGame()">
      <button onclick="startGame()">[ START GAME ]</button>
    </div>

    <!-- Game Screen -->
    <div id="gameScreen" style="display:none;">
      <h1>⚡ CYBER MATH ⚡</h1>
      <div class="subtitle">// NEURAL ARITHMETIC TRAINING //</div>

      <div class="stats">
        <div class="stat-box">
          <div class="stat-label">Score</div>
          <div class="stat-value" id="score">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Time</div>
          <div class="stat-value" id="timer">60</div>

  <!-- LEADERBOARD -->

    <div id="leaderboardList">
      <div class="lb-empty">Loading...</div>

</div>

  <span class="text">🧠 Want to boost your brain & math skills?</span>

<!-- Firebase -->
<script type="module">
  import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, push, onValue, query, orderByChild, limitToLast }
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyACEw-IjLqi6GeFmpVKU_u0G5bFSd19rL0",
    authDomain: "math-game-leaderboard-cd3b4.firebaseapp.com",
    databaseURL: "https://math-game-leaderboard-cd3b4-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "math-game-leaderboard-cd3b4",
    storageBucket: "math-game-leaderboard-cd3b4.firebasestorage.app",
    messagingSenderId: "416972782525",
    appId: "1:416972782525:web:a1498613cc7de8b16c70d4"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  function loadLeaderboard() {
    const scoresRef = query(
      ref(db, 'scores'),
      orderByChild('score'),
      limitToLast(10)
    );
    onValue(scoresRef, (snapshot) => {
      const list = document.getElementById('leaderboardList');
      const data = snapshot.val();
      if (!data) {
        list.innerHTML = '<div class="lb-empty">No scores yet!<br>Be the first! 🎮</div>';
        return;
      }
      const scores = Object.values(data)
        .sort((a, b) => b.score - a.score)
        .slice(0, 10);
      list.innerHTML = scores.map((s, i) => {
        const cls = i===0?'top1':i===1?'top2':i===2?'top3':'';
        const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':`#${i+1}`;
        return `
          <div class="lb-entry ${cls}">
            <span>${medal}</span>
            <span>${s.name}</span>
            <span class="lb-score">${s.score}</span>
          </div>`;
      }).join('');
    });
  }

  window.saveScore = function(name, score) {
    push(ref(db, 'scores'), {
      name: name,
      score: score,
      time: new Date().toISOString()
    });
  };

  loadLeaderboard();
</script>

<script>
  // ─── PARTICLES ─────────────────────────
  const pCanvas = document.getElementById('particles');
  const pCtx = pCanvas.getContext('2d');
  pCanvas.width = window.innerWidth;
  pCanvas.height = window.innerHeight;

  const particles = Array.from({length: 80}, () => ({
    x: Math.random() * pCanvas.width,
    y: Math.random() * pCanvas.height,
    size: Math.random() * 2 + 0.5,
    speedX: (Math.random() - 0.5) * 0.5,
    speedY: (Math.random() - 0.5) * 0.5,
    color: Math.random() > 0.5 ? '#00ffff' : '#ff00ff',
    opacity: Math.random() * 0.5 + 0.2
  }));

  function animateParticles() {
    pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
    particles.forEach(p => {
      p.x += p.speedX;
      p.y += p.speedY;
      if (p.x < 0 || p.x > pCanvas.width)  p.speedX *= -1;
      if (p.y < 0 || p.y > pCanvas.height) p.speedY *= -1;
      pCtx.beginPath();
      pCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      pCtx.fillStyle = p.color;
      pCtx.globalAlpha = p.opacity;
      pCtx.fill();
    });
    requestAnimationFrame(animateParticles);
  }
  animateParticles();

  // ─── FIREWORKS ─────────────────────────
  const fCanvas = document.getElementById('fireworks');
  const fCtx = fCanvas.getContext('2d');
  fCanvas.width = window.innerWidth;
  fCanvas.height = window.innerHeight;
  let fireworkParticles = [];

  function launchFirework() {
    const x = Math.random() * fCanvas.width;
    const y = Math.random() * fCanvas.height * 0.5;
    const colors = ['#00ffff','#ff00ff','#00ff88','#f0a500','#ffffff'];
    for (let i = 0; i < 40; i++) {
      const angle = (Math.PI * 2 / 40) * i;
      const speed = Math.random() * 4 + 2;
      fireworkParticles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        alpha: 1,
        color: colors[Math.floor(Math.random() * colors.length)],
        size: Math.random() * 3 + 1
      });
    }
  }

  function animateFireworks() {
    fCtx.clearRect(0, 0, fCanvas.width, fCanvas.height);
    fireworkParticles = fireworkParticles.filter(p => p.alpha > 0.01);
    fireworkParticles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.08;
      p.alpha -= 0.02;
      fCtx.beginPath();
      fCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      fCtx.fillStyle = p.color;
      fCtx.globalAlpha = p.alpha;
      fCtx.fill();
    });
    requestAnimationFrame(animateFireworks);
  }
  animateFireworks();

  // ─── FLASH ─────────────────────────────
  function flashScreen(color) {
    const flash = document.getElementById('flash');
    flash.style.background = color;
    flash.style.opacity = '0.15';
    setTimeout(() => { flash.style.opacity = '0'; }, 150);
  }

  // ─── GAME VARIABLES ────────────────────
  let num1, num2, operator;
  let score = 0, time = 60, best = 0, streak = 0;
  let playerName = '';
  let countdown;
  const totalTime = 60;

  // ─── START GAME ────────────────────────
  window.startGame = function() {
    const nameInput = document.getElementById('playerName').value.trim();
    if (!nameInput) {
      alert('Please enter your name!');
      return;
    }
    playerName = nameInput;
    document.getElementById('nameScreen').style.display = 'none';
    document.getElementById('gameScreen').style.display = 'block';
    generateQuestion();
    document.getElementById('timerFill').style.width = '100%';
    document.getElementById('answer').focus();
    startTimer();
  }

  // ─── GENERATE QUESTION ─────────────────
  function generateQuestion() {
    num1 = Math.floor(Math.random() * 20) + 1;
    num2 = Math.floor(Math.random() * 20) + 1;
    const ops = ['+', '-', '*', '/'];
    operator = ops[Math.floor(Math.random() * ops.length)];
    if (operator === '/') num1 = num1 * num2;
    document.getElementById('question').innerText =
      num1 + ' ' + operator + ' ' + num2 + ' = ?';
  }

  // ─── CHECK ANSWER ──────────────────────
  window.checkAnswer = function() {
    const input = document.getElementById('answer');
    if (input.value === '') return;
    const userAnswer = Number(input.value);
    let correct = 0;
    if (operator === '+') correct = num1 + num2;
    if (operator === '-') correct = num1 - num2;
    if (operator === '*') correct = num1 * num2;
    if (operator === '/') correct = num1 / num2;

    const msg = document.getElementById('message');

    if (userAnswer === correct) {
      score++;
      streak++;
      launchFirework();
      launchFirework();
      flashScreen('#00ff88');
      msg.innerText = streak >= 3 ? `🔥 ${streak} STREAK!` : '✅ CORRECT!';
      msg.className = 'message correct';
      document.getElementById('streak').innerText =
        streak >= 3 ? `⚡ ${streak}x COMBO!` : '';
    } else {
      streak = 0;
      flashScreen('#ff0055');
      msg.innerText = '❌ WRONG! ANS: ' + correct;
      msg.className = 'message wrong';
      document.getElementById('streak').innerText = '';
    }

    setTimeout(() => {
      msg.innerText = '';
      msg.className = 'message';
    }, 1000);

    document.getElementById('score').innerText = score;
    input.value = '';
    generateQuestion();
    input.focus();
  }

  // ─── TIMER ─────────────────────────────
  function startTimer() {
    countdown = setInterval(() => {
      time--;
      document.getElementById('timer').innerText = time;
      document.getElementById('timerFill').style.width =
        (time / totalTime * 100) + '%';

      if (time <= 10) {
        document.getElementById('timer').style.color = '#ff0055';
        document.getElementById('timer').style.textShadow = '0 0 10px #ff0055';
      }

      if (time <= 0) {
        clearInterval(countdown);
        if (score > best) best = score;
        window.saveScore(playerName, score);
        setTimeout(() => {
          alert(`⚡ GAME OVER!\nPlayer: ${playerName}\nScore: ${score}\nBest: ${best}`);
          location.reload();
        }, 100);
      }
    }, 1000);
  }
</script>

</body>
